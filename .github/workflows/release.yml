name: Release

# This is the main release pipeline. Triggered by pushing a v* tag.
# 1. Generates release notes from commits since the last tag
# 2. Creates a GitHub Release
# 3. Triggers Docker build & push to GHCR + Docker Hub

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version
        id: version
        run: echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          cat > /tmp/release_notes.md << EOF
          ## What's Changed

          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md#${TAG//./}---$(date +%Y-%m-%d)) for full details.

          EOF

          if [ -n "$PREV_TAG" ]; then
            echo "**Full Changelog:** https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}" >> /tmp/release_notes.md
            echo "" >> /tmp/release_notes.md
            echo "### Commits" >> /tmp/release_notes.md
            echo '```' >> /tmp/release_notes.md
            git log ${PREV_TAG}..HEAD --oneline --no-merges >> /tmp/release_notes.md
            echo '```' >> /tmp/release_notes.md
          else
            echo "### Commits" >> /tmp/release_notes.md
            echo '```' >> /tmp/release_notes.md
            git log --oneline --no-merges >> /tmp/release_notes.md
            echo '```' >> /tmp/release_notes.md
          fi

          echo "" >> /tmp/release_notes.md
          echo "### Docker" >> /tmp/release_notes.md
          echo '```bash' >> /tmp/release_notes.md
          echo "docker pull ghcr.io/${{ github.repository }}:${TAG}" >> /tmp/release_notes.md
          echo "docker pull ghcr.io/${{ github.repository }}:latest" >> /tmp/release_notes.md
          echo '```' >> /tmp/release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: /tmp/release_notes.md
          draft: false
          prerelease: false

  docker:
    needs: release
    uses: ./.github/workflows/publish.yml
    secrets: inherit

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">

    <!-- PWA: iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LLM Search">
    <link rel="apple-touch-icon" href="/static/icon.svg">

    <!-- PWA: Android / general -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a1a2e">
    <link rel="manifest" href="/static/manifest.json">

    <title>LLM Search Chat</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header id="header">
            <h1 id="title">LLM Search Chat</h1>
            <div id="header-controls">
                <select id="model-select" title="Select model">
                    <option value="">Loading models…</option>
                </select>
                <button id="clear-btn" title="Clear conversation" aria-label="Clear conversation">&#x1F5D1;</button>
            </div>
        </header>

        <!-- Chat area -->
        <main id="chat-container">
            <!-- Install banner: shown only on mobile, only when not already in standalone mode -->
            <div id="install-banner" class="hidden">
                <div id="install-banner-icon">📱</div>
                <div id="install-banner-text">
                    <span id="install-banner-title">Add to Home Screen</span>
                    <span id="install-banner-instruction"></span>
                </div>
                <button id="install-banner-dismiss" title="Dismiss" aria-label="Dismiss">&times;</button>
            </div>

            <div id="messages">
                <div class="welcome">
                    <p><strong>LLM Search Chat</strong></p>
                    <p>Your local LLM with internet search. Try asking a question about current events!</p>
                    <p class="welcome-hints">
                        <span>🖼️ <strong>Paste</strong> an image from clipboard</span>
                        <span>📎 <strong>Attach</strong> a text file or image</span>
                        <span>⚡ <strong>Streaming</strong> responses</span>
                    </p>
                </div>
            </div>
        </main>

        <!-- Input area -->
        <footer id="input-area">
            <!-- Image preview -->
            <div id="image-preview" class="hidden">
                <img id="image-preview-img" src="" alt="Attached image preview">
                <button id="remove-image-btn" title="Remove image" aria-label="Remove image">&times;</button>
            </div>

            <!-- File preview -->
            <div id="file-preview" class="hidden">
                <span id="file-preview-icon">&#x1F4C4;</span>
                <span id="file-preview-name"></span>
                <span id="file-preview-size"></span>
                <button id="remove-file-btn" title="Remove file" aria-label="Remove file">&times;</button>
            </div>

            <!-- Error banner -->
            <div id="error-banner" class="hidden"></div>

            <div id="input-row">
                <button id="attach-btn" title="Attach file or image" aria-label="Attach file or image">&#x1F4CE;</button>
                <input type="file" id="file-input" hidden
                    accept="image/*,.txt,.py,.js,.ts,.jsx,.tsx,.md,.json,.csv,.html,.css,.xml,.yaml,.yml,.log,.sh,.bash,.ps1,.toml,.ini,.cfg,.env,.gitignore,.rs,.go,.java,.c,.cpp,.h,.hpp,.rb,.php,.sql,.r,.m,.swift,.kt">
                <div id="input-wrapper">
                    <textarea id="message-input" rows="1"
                        placeholder="Type a message… (Ctrl+V to paste image, Enter to send, Shift+Enter for newline)"
                        aria-label="Message input"></textarea>
                </div>
                <button id="send-btn" disabled aria-label="Send message">
                    <span id="send-icon">&#x25B2;</span>
                    <span id="stop-icon" class="hidden">&#x25A0;</span>
                </button>
            </div>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/app.js"></script>

    <!-- Register service worker for PWA installability -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(() => console.log('PWA: service worker registered'))
                .catch((err) => console.warn('PWA: service worker failed', err));
        }
    </script>
</body>
</html>
